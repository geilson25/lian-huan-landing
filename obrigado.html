<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado – Instituto Lian Huan | Agendamento Recebido</title>
  <meta name="description" content="Recebemos sua solicitação de avaliação no Instituto Lian Huan. Em breve entraremos em contato via WhatsApp.">
  <meta name="robots" content="noindex, follow">
  
  <link rel="canonical" href="https://lian-huan-landing.netlify.app/obrigado.html">
  
  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="/logo.ico">
  <link rel="shortcut icon" type="image/x-icon" href="/logo.ico">
  
  <meta property="og:title" content="Obrigado – Instituto Lian Huan">
  <meta property="og:description" content="Recebemos sua solicitação de avaliação no Instituto Lian Huan.">
  <meta property="og:image" content="https://lian-huan-landing.netlify.app/logo.png">
  <meta property="og:url" content="https://lian-huan-landing.netlify.app/obrigado.html">
  <meta property="og:type" content="website">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="obrigado py-5 text-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
          <h1 class="mb-3">Recebemos sua solicitação!</h1>
          <p class="lead">Em breve nossa equipe do <strong>Instituto Lian Huan</strong> entrará em contato via WhatsApp.</p>
          
          <button id="btnWhatsApp" class="btn btn-success btn-lg mt-3">
            <i class="fab fa-whatsapp"></i> Falar agora no WhatsApp
          </button>
          <br>
          
          <div class="mt-4">
            <a href="/anamnese.html" class="btn btn-secondary btn-lg">
              <i class="fas fa-file-medical"></i> Preencher ficha de anamnese
            </a>
            <p class="text-muted small mt-2">Quanto mais detalhes, melhor podemos te atender!</p>
          </div>
          
          <div class="mt-3">
            <a href="https://www.instagram.com/lian_huan_instituto/" target="_blank" class="btn btn-outline-secondary me-2">
              <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.facebook.com/joseivo.sampaio/" target="_blank" class="btn btn-outline-primary me-2">
              <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://www.youtube.com/@Prof.ivosampaio" target="_blank" class="btn btn-outline-danger me-2">
              <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://wa.me/5581991037789" target="_blank" class="btn btn-outline-success">
              <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
          </div>
          
          <a href="/" class="btn btn-outline-secondary mt-3">← Voltar para a página inicial</a>
        </div>
      </div>
    </div>
  </section>

  <script>
    (function() {
      const leadData = sessionStorage.getItem('leadData');
      if (!leadData) {
        window.location.href = '/';
        return;
      }
      const { nome, whatsapp, email, cidade, queixa } = JSON.parse(leadData);
      const numero = '558187361800';
      const mensagem = `Olá! Meu nome é ${nome} e gostaria de agendar uma avaliação no Instituto Lian Huan. %0A` +
                       `WhatsApp: ${whatsapp} %0A` +
                       `E-mail: ${email || 'Não informado'} %0A` +
                       `Cidade: ${cidade || 'Não informada'} %0A` +
                       `Principal queixa: ${queixa} %0A%0A` +
                       `🔗 Preencha nossa ficha de anamnese completa: %0A` +
                       `https://lian-huan-landing.netlify.app/anamnese.html`;
      const urlWhats = `https://wa.me/${numero}?text=${mensagem}`;
      document.getElementById('btnWhatsApp').addEventListener('click', function() {
        window.open(urlWhats, '_blank');
      });
    })();
  </script>

</body>
</html>
