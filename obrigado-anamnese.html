<body>

  <section class="obrigado py-5 text-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
          <h1>Ficha de anamnese enviada!</h1>
          <p class="lead">Agradecemos pelos detalhes. Nossa equipe do <strong>Instituto Lian Huan</strong> já está analisando.</p>
          
          <div style="background: #f8f6f0; border-radius: 12px; padding: 20px; margin: 20px 0;">
            <p class="text-muted mb-2"><i class="fas fa-download me-2"></i>Baixe o PDF com todos os dados preenchidos</p>
            <button id="btnDownloadPDF" class="btn btn-primary btn-lg">
              <i class="fas fa-file-pdf"></i> Baixar PDF
            </button>
          </div>

          <div style="background: #e8f5e9; border-radius: 12px; padding: 20px; margin: 20px 0;">
            <p class="text-muted mb-2"><i class="fab fa-whatsapp me-2"></i>Envie um resumo pelo WhatsApp</p>
            <button id="btnWhatsAppAnamnese" class="btn btn-success btn-lg">
              <i class="fab fa-whatsapp"></i> Enviar via WhatsApp
            </button>
          </div>

          <div class="mt-3">
            <a href="https://www.instagram.com/lian_huan_instituto/" target="_blank" class="btn btn-outline-secondary me-2">
              <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.facebook.com/joseivo.sampaio/" target="_blank" class="btn btn-outline-primary me-2">
              <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://www.youtube.com/@Prof.ivosampaio" target="_blank" class="btn btn-outline-danger me-2">
              <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://wa.me/5581991037789" target="_blank" class="btn btn-outline-success">
              <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
          </div>
          
          <a href="/" class="btn btn-outline-secondary mt-3">← Voltar ao início</a>
        </div>
      </div>
    </div>
  </section>

  <script>
    (function() {
      const dadosAnamnese = sessionStorage.getItem('dadosAnamnese');
      if (!dadosAnamnese) {
        alert('Nenhum dado encontrado. Preencha a ficha novamente.');
        window.location.href = '/anamnese.html';
        return;
      }
      const dados = JSON.parse(dadosAnamnese);

      document.getElementById('btnDownloadPDF').addEventListener('click', function() {
        if (typeof gerarPDF === 'function') {
          gerarPDF(dados);
        } else {
          alert('Erro ao gerar PDF. Verifique se os arquivos foram carregados corretamente.');
        }
      });

      document.getElementById('btnWhatsAppAnamnese').addEventListener('click', function() {
        const numero = '558187361800';
        const mensagem = 
          `🔹 *Ficha de Anamnese - Instituto Lian Huan* 🔹%0A%0A` +
          `*Nome:* ${dados.nome_completo || 'N/I'}%0A` +
          `*Data Nasc.:* ${dados.data_nasc || 'N/I'}%0A` +
          `*Sexo:* ${dados.sexo || 'N/I'}%0A` +
          `*Telefone:* ${dados.telefone || 'N/I'}%0A` +
          `*E-mail:* ${dados.email_anamnese || 'N/I'}%0A` +
          `*Queixa Principal:* ${dados.queixa_principal || 'N/I'}%0A%0A` +
          `📄 *PDF completo disponível para download no site.*`;
        const url = `https://wa.me/${numero}?text=${mensagem}`;
        window.open(url, '_blank');
      });
    })();
  </script>

</body>
</html>
